# Continuous Integration – runs on every PR and push to develop/main.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag,api]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Check formatting with black
        run: black --check src/ tests/

      - name: Check import order with isort
        run: isort --check-only src/ tests/

      - name: Type check with mypy
        run: mypy src/ai_engine/ --ignore-missing-imports
        continue-on-error: true  # advisory until full stubs are added

      - name: Run tests with coverage
        run: |
          pytest --cov=src/ai_engine --cov-report=term-missing --cov-fail-under=80
