# Continuous Integration – runs on every PR and push to develop/main.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,rag,api]"

      - name: Lint with ruff
        run: ruff check ai_engine/ tests/

      - name: Check formatting with black
        run: black --check ai_engine/ tests/

      - name: Check import order with isort
        run: isort --check-only ai_engine/ tests/

      - name: Type check with mypy
        run: mypy ai_engine/ --ignore-missing-imports
        continue-on-error: true  # advisory until full stubs are added

      - name: Run tests with coverage
        run: |
          pytest --cov=ai_engine --cov-report=term-missing --cov-fail-under=80

  optional-extras-matrix:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    strategy:
      fail-fast: false
      matrix:
        profile: [core_api, rag_kbd, redis]
        include:
          - profile: core_api
            extras: "dev,api"
            test_cmd: "pytest -q tests/test_api tests/test_observability tests/test_games tests/test_llm tests/test_config.py"
          - profile: rag_kbd
            extras: "dev,api,rag,kbd"
            test_cmd: "pytest -q tests/test_rag tests/test_kbd"
          - profile: redis
            extras: "dev,api,redis"
            test_cmd: "pytest -q tests/test_api/test_optimization.py -k redis"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies for profile ${{ matrix.profile }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extras }}]"

      - name: Run profile checks (${{ matrix.profile }})
        run: ${{ matrix.test_cmd }}
